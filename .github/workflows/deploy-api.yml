name: Deploy API server to Fly.io
on:
  push:
    branches:
      - dev
      - main
    paths:
      - "backend/main/**" # only trigger when this dir changes

jobs:
  deploy:
    name: Deploy backend api
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-api-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: backend/main

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26.2"
          elixir-version: "1.19.5"

      - name: Cache deps
        uses: actions/cache@v3
        with:
          path: backend/main/deps
          key: ${{ runner.OS }}-otp26-elixir19-mix-${{ hashFiles('**/mix.lock') }}

      - name: Cache build
        uses: actions/cache@v3
        with:
          path: backend/main/_build
          key: ${{ runner.OS }}-otp26-elixir19-build-${{ hashFiles('**/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
