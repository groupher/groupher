name: Deploy API server to Fly.io
on:
  push:
    branches:
      - [dev, auto-deploy-to-fly]
    paths:
      - "backend/**" # only trigger when this dir changes

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend # 设置工作目录为 backend

    steps:
      - uses: actions/checkout@v3

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "25.0"
          elixir-version: "1.15.7"

      - name: Cache deps
        uses: actions/cache@v3
        with:
          path: backend/deps
          key: ${{ runner.OS }}-mix-${{ hashFiles('**/mix.lock') }}

      - name: Cache build
        uses: actions/cache@v3
        with:
          path: backend/_build
          key: ${{ runner.OS }}-build-${{ hashFiles('**/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      # - name: Run tests
      #   run: mix test

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
