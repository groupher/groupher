name: Build frontend dashboard

on:
  push:
    paths:
      - 'frontend/dashboard/**' # only trigger when this dir changes
      - '!frontend/dashboard/vercel.json'

jobs:
  build:
    name: Build dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: 'groupher/groupher'
          path: './'

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22.13.0'

      - name: Install Yarn Dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Start mock GraphQL
        run: |
          yarn mock:server &
          for attempt in {1..30}; do
            if curl -fsS http://localhost:4001/health; then
              exit 0
            fi
            sleep 1
          done
          echo "Mock GraphQL server did not become healthy within 30 seconds" >&2
          exit 1

      - name: Build Project
        run: yarn run build:prod:dashboard
