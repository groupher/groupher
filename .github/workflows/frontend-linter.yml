name: Frontend linter

on:
  pull_request:
    paths:
      - "frontend/{main,dashboard,landing,core}/**/*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc}"
      - "frontend/**/biome.json"
      - "package.json"
      - "yarn.lock"
      - "biome.json"
  push:
    paths:
      - "frontend/{main,dashboard,landing,core}/**/*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc}"
      - "frontend/**/biome.json"
      - "package.json"
      - "yarn.lock"
      - "biome.json"

permissions:
  contents: read

jobs:
  changes:
    name: Detect frontend linter changes
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.matrix.outputs.targets }}
      has_targets: ${{ steps.matrix.outputs.has_targets }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            main:
              - 'frontend/main/**/*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc}'
            dashboard:
              - 'frontend/dashboard/**/*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc}'
            landing:
              - 'frontend/landing/**/*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc}'
            shared:
              - 'frontend/core/**/*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc}'
              - 'frontend/**/biome.json'
              - 'package.json'
              - 'yarn.lock'
              - 'biome.json'

      - name: Build matrix
        id: matrix
        env:
          MAIN_CHANGED: ${{ steps.filter.outputs.main }}
          DASHBOARD_CHANGED: ${{ steps.filter.outputs.dashboard }}
          LANDING_CHANGED: ${{ steps.filter.outputs.landing }}
          SHARED_CHANGED: ${{ steps.filter.outputs.shared }}
        run: |
          targets=()

          if [ "$SHARED_CHANGED" = "true" ] || [ "$MAIN_CHANGED" = "true" ]; then
            targets+=('{"target":"main","path":"frontend/main"}')
          fi

          if [ "$SHARED_CHANGED" = "true" ]; then
            targets+=('{"target":"core","path":"frontend/core"}')
          fi

          if [ "$SHARED_CHANGED" = "true" ] || [ "$DASHBOARD_CHANGED" = "true" ]; then
            targets+=('{"target":"dashboard","path":"frontend/dashboard"}')
          fi

          if [ "$SHARED_CHANGED" = "true" ] || [ "$LANDING_CHANGED" = "true" ]; then
            targets+=('{"target":"landing","path":"frontend/landing"}')
          fi

          if [ ${#targets[@]} -eq 0 ]; then
            echo 'targets={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'has_targets=false' >> "$GITHUB_OUTPUT"
          else
            joined=$(printf '%s\n' "${targets[@]}" | paste -sd, -)
            echo "targets={\"include\":[${joined}]}" >> "$GITHUB_OUTPUT"
            echo 'has_targets=true' >> "$GITHUB_OUTPUT"
          fi

  biome:
    name: biome (${{ matrix.target }})
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.has_targets == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.targets) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install deps
        run: yarn install --immutable

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: "2.3.11"

      - name: Run Biome CI
        run: biome ci ${{ matrix.path }}
