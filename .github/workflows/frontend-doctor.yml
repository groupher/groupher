name: Frontend React Doctor

on:
  pull_request:
    branches:
      - dev
    paths:
      - "frontend/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/frontend-doctor.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  react-doctor:
    name: React Doctor (frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run React Doctor
        uses: millionco/react-doctor@main
        with:
          directory: .
          project: "@groupher/frontend-core,@groupher/frontend-main,@groupher/frontend-dashboard,@groupher/frontend-landing,@groupher/frontend-gateway"
          diff: dev
          github-token: ${{ secrets.GITHUB_TOKEN }}
