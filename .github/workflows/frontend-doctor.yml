name: Frontend React Doctor

on:
  pull_request:
    branches:
      - dev
    paths:
      - "frontend/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/frontend-doctor.yml"

permissions:
  contents: read

jobs:
  react-doctor:
    name: React Doctor (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: core
            directory: frontend/core
          - app: main
            directory: frontend/main
          - app: dashboard
            directory: frontend/dashboard
          - app: landing
            directory: frontend/landing
          - app: gateway
            directory: frontend/gateway

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run React Doctor
        uses: millionco/react-doctor@main
        with:
          directory: ${{ matrix.directory }}
          diff: dev
