name: Backend unit tests
on:
  push:
    paths:
      - "backend/main/**" # only trigger when this dir changes

jobs:
  setup:
    name: Setup environment
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/main

    steps:
      - uses: actions/checkout@v3

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "25.0"
          elixir-version: "1.15.7"

      - name: Cache deps
        uses: actions/cache@v3
        with:
          path: backend/main/deps
          key: ${{ runner.OS }}-mix-${{ hashFiles('**/mix.lock') }}

      - name: Cache build
        uses: actions/cache@v3
        with:
          path: backend/main/_build
          key: ${{ runner.OS }}-build-${{ hashFiles('**/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Save setup artifacts
        uses: actions/upload-artifact@v3
        with:
          name: setup-artifacts
          path: |
            backend/main/deps
            backend/main/_build

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: setup  # 依赖 setup 作业
    defaults:
      run:
        working-directory: backend/main
    strategy:
      matrix:
        retry: [1, 2, 3]  # 重试 3 次
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: groupher_server_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Download setup artifacts
        uses: actions/download-artifact@v3
        with:
          name: setup-artifacts
          path: backend/main

      - name: Run tests
        run: mix test