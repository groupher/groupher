  publishDocTree(community: String!): DoneState

  "move one published docs page back to draft visibility"
  moveDocToDraft(community: String!, id: ID!): DoneState

  "move one docs side-tree group and its children back to draft visibility"
  moveDocTreeGroupToDraft(community: String!, groupId: ID!): DoneState

  "restore a docs draft from an article revision"
  restoreDocDraftRevision(community: String!, id: ID!, revisionId: ID!): DocDraft

  "delete a docs tree node"
  deleteDocTreeNode(community: String!, id: ID!, baseRevision: Int!): DocTreeMutationPayload

  "duplicate a docs tree node"
  duplicateDocTreeNode(community: String!, id: ID!, baseRevision: Int!): DocTreeMutationPayload

  "move a docs tree node"
  moveDocTreeNode(community: String!, id: ID!, baseRevision: Int!, targetParentId: ID, targetIndex: Int): DocTreeMutationPayload

  "add a published docs side-tree group to cover"
  addDocCoverGroup(community: String!, groupId: ID!): DocCoverGroup

  "remove a docs side-tree group from cover"
  removeDocCoverGroup(community: String!, groupId: ID!): DocCoverGroup

  "toggle a docs page visibility in its cover group"
  setDocCoverItemHidden(community: String!, nodeId: ID!, hidden: Boolean!): DocCoverItem

  "reorder docs cover groups"
  reorderDocCoverGroups(community: String!, ids: [ID!]!): DoneState

  "reorder docs cover items inside a cover group"
  reorderDocCoverItems(community: String!, coverGroupId: ID!, ids: [ID!]!): DoneState

  "update docs cover group UI config"
  updateDocCoverGroupUiConfig(community: String!, id: ID!, uiConfig: Json!): DocCoverGroup

  "update docs cover item UI config"
  updateDocCoverItemUiConfig(community: String!, id: ID!, uiConfig: Json!): DocCoverItem

  "pin a published docs page to cover"
  pinDocCoverItem(community: String!, nodeId: ID!, uiConfig: Json): DocCoverPinnedItem

  "remove a published docs page from cover pins"
  unpinDocCoverItem(community: String!, nodeId: ID!): DocCoverPinnedItem

  "update a pinned docs cover UI config"
  updateDocCoverPinnedUiConfig(community: String!, nodeId: ID!, uiConfig: Json!): DocCoverPinnedItem
}

