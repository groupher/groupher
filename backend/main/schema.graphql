  ): CommunityTag

  "update a tag"
  updateCommunityTag(
    id: ID!, community: String!, title: String, layout: String, desc: String, slug: String, color: RainbowColor, groupId: ID, thread: Thread, extra: [String], marker: MarkerInput
  ): CommunityTag

  "create a tag group"
