type CheckState {
  exist: Boolean
}

type DoneState {
  done: Boolean
}

type CommonUser {
  login: String
  avatar: String
  nickname: String
  bio: String
  shortbio: String
}

type CommonArticle {
  thread: Thread
  id: ID
  title: String
  author: CommonUser
}

type CommonComment {
  id: ID
  bodyHtml: String
  upvotesCount: Int
  author: CommonUser
  article: CommonArticle
}

type ThreadDocument {
  json: String
  markdown: String
  markdownToc: Json
  html: String
  rss: String
}

type Post implements Article {
  innerId: ID
  title: String
  document: ThreadDocument
  digest: String
  views: Int
  isPinned: Boolean
  markDelete: Boolean
  communityTags: [CommunityTag]
  author: User
  community: Community
  communitySlug: String
  communities: [Community]
  meta: ArticleMeta
  upvotesCount: Int
  collectsCount: Int
  emotions: [EmotionStat]
  viewerHasCollected: Boolean
  viewerHasUpvoted: Boolean
  viewerHasViewed: Boolean
  viewerHasReported: Boolean
  isArchived: Boolean
  archivedAt: DateTime
  copyRight: String
  linkAddr: String
  pending: Int
  commentsParticipants: [User]
  commentsParticipantsCount: Int
  commentsCount: Int
  cat: ArticleCatEnum
  status: ArticleStatusEnum
  insertedAt: DateTime
  updatedAt: DateTime
  activeAt: DateTime
}

type Changelog implements Article {
  innerId: ID
  title: String
  document: ThreadDocument
  digest: String
  views: Int
  isPinned: Boolean
  markDelete: Boolean
  communityTags: [CommunityTag]
  author: User
  community: Community
  communitySlug: String
  communities: [Community]
  meta: ArticleMeta
  upvotesCount: Int
  collectsCount: Int
  emotions: [EmotionStat]
  viewerHasCollected: Boolean
  viewerHasUpvoted: Boolean
  viewerHasViewed: Boolean
  viewerHasReported: Boolean
  isArchived: Boolean
  archivedAt: DateTime
  copyRight: String
  linkAddr: String
  pending: Int
  commentsParticipants: [User]
  commentsParticipantsCount: Int
  commentsCount: Int
  insertedAt: DateTime
  updatedAt: DateTime
  activeAt: DateTime
}

type Doc implements Article {
  innerId: ID
  title: String
  document: ThreadDocument
  digest: String
  views: Int
  isPinned: Boolean
  markDelete: Boolean
  communityTags: [CommunityTag]
  author: User
  community: Community
