schema {
  mutation: RootMutationType
  query: RootQueryType
}

type RootQueryType {
  "get all users"
  pagedUsers(filter: PagedUsersFilter!): PagedUsers!

  "get cur user"
  me: User

  "get user by id"
  user(login: String!): User

  "check the cur token is valid or not"
  sessionState: SessionState

  "anyone can get anyone's subscribed communities"
  subscribedCommunities(login: String, filter: PagiFilter!): PagedCommunities

  "get login user's mentions in mailbox"
  pagedMentions(filter: MailboxMentionsFilter): PagedMailboxMentions

  "get login user's notifications in mailbox"
  pagedNotifications(filter: MailboxNotificationsFilter): PagedMailboxNotifications

  "get user's follower"
  pagedFollowers(login: String!, filter: PagiFilter!): PagedUsers

  "get user's follower"
  pagedFollowings(login: String!, filter: PagiFilter!): PagedUsers

  "get paged upvoted articles"
  pagedUpvotedArticles(login: String!, filter: UpvotedArticlesFilter): PagedArticles

  "get paged collect folders of a user"
  pagedCollectFolders(login: String!, filter: CollectFoldersFilter!): PagedCollectFolders

  "get paged collected articles"
  pagedCollectedArticles(folderId: ID!, filter: CollectedArticlesFilter!): PagedArticles

  "paged communities which the user it's the editor"
  moderatorableCommunities(login: String, filter: PagiFilter!): PagedCommunities

  "get all passport rules include system and community etc ..."
  allPassportRulesString: Rules

  "search user by name"
  searchUsers(name: String!): PagedUsers

  "get paged published article comments"
  pagedPublishedComments(login: String!, filter: PagiFilter!, thread: Thread): PagedComments

  "paged published posts"
  pagedPublishedPosts(login: String!, filter: PagiFilter!, thread: PostThread): PagedPosts

  "paged published blogs"
  pagedPublishedBlogs(login: String!, filter: PagiFilter!, thread: BlogThread): PagedBlogs

  "paged published changelogs"
  pagedPublishedChangelogs(login: String!, filter: PagiFilter!, thread: ChangelogThread): PagedChangelogs

  "paged published docs"
  pagedPublishedDocs(login: String!, filter: PagiFilter!, thread: DocThread): PagedDocs

  "list cities geo info"
  citiesGeoInfo: PagedGeoInfos

  "basic online status"
  onlineStatus(freshkey: String): OnlineStatusInfo

  "basic site info in total counts format"
  countStatus: CountStatusInfo

  "spec community info"
  community(slug: String!, incViews: Boolean): Community

  allPassportRules: AllRules

  "if use has pending apply"
  hasPendingCommunityApply: CheckState

  "if the community exist or not"
  isCommunityExist(slug: String!): CheckState

  "communities with pagination info"
  pagedCommunities(filter: CommunitiesFilter!): PagedCommunities

  "paged subscribers of a community"
  pagedCommunitySubscribers(id: ID, community: String, filter: PagiFilter): PagedUsers

  "paged subscribers of a community"
  pagedCommunityModerators(id: ID!, filter: PagiFilter): PagedUsers

  "get all categories"
  pagedCategories(filter: PagiFilter): PagedCategories

  "get community tag groups"
  communityTagGroups(community: String!, thread: Thread): [CommunityTagGroup]

  "get community tag stats by community, thread and slug"
  communityTagStats(community: String!, thread: Thread!, slug: String!): CommunityTagStat

  "got basic comments state"
  commentsState(article: ArticleRefInput!, freshkey: String): CommentsListState

  "got spec comment by id"
  oneComment(id: ID!): Comment

  "get paged article comments"
  pagedComments(article: ArticleRefInput!, mode: CommentsMode, filter: CommentsFilter): PagedComments

  "get paged article comments participants"
  pagedCommentsParticipants(article: ArticleRefInput!, filter: PagiFilter): PagedUsers

  "get paged replies of a comment"
  pagedCommentReplies(id: ID!, filter: CommentsFilter): PagedCommentReplies

  "paged reports list"
  pagedAbuseReports(filter: ReportFilter!): PagedReports

  "paged citings list"
  pagedCitingContents(id: ID!, content: Content, filter: PagiFilter): PagedCitings

  "search communities by title"
  searchCommunities(title: String!, category: String): PagedCommunities

  "kanban posts grouped by backlog\/todo\/wip\/done\/rejected"
  groupedKanbanPosts(community: String!): KanbanPosts

  "get open graph info by url"
  openGraphInfo(url: String!): OpenGraph

  "paged kanban posts by status"
  pagedKanbanPosts(community: String!, filter: PagedKanbanPostsFilter!): PagedPosts

  "get post by id"
  searchPosts(title: String!, thread: PostThread): PagedPosts

  "get blog by id"
  searchBlogs(title: String!, thread: BlogThread): PagedBlogs

  "get changelog by id"
  searchChangelogs(title: String!, thread: ChangelogThread): PagedChangelogs

  "get doc by id"
  searchDocs(title: String!, thread: DocThread): PagedDocs

  "get paged upvoted users of an article"
  upvotedUsers(article: ArticleRefInput!, filter: PagiFilter!): PagedUsers

  "get paged collected users of an article"
  collectedUsers(article: ArticleRefInput!, filter: PagiFilter!): PagedUsers

  "get post by id"
  post(article: ArticleRefInput!): Post!

  "get paged posts"
  pagedPosts(thread: PostThread, filter: PagedPostsFilter!): PagedPosts

  "get blog by id"
  blog(article: ArticleRefInput!): Blog!

  "get paged blogs"
  pagedBlogs(thread: BlogThread, filter: PagedBlogsFilter!): PagedBlogs

  "get changelog by id"
  changelog(article: ArticleRefInput!): Changelog!

  "get paged changelogs"
  pagedChangelogs(thread: ChangelogThread, filter: PagedChangelogsFilter!): PagedChangelogs

  "get doc by id"
  doc(article: ArticleRefInput!): Doc!

  "get paged docs"
  pagedDocs(thread: DocThread, filter: PagedDocsFilter!): PagedDocs
}

type RootMutationType {
  "update user's profile"
  updateProfile(profile: UserProfileInput!, social: SocialInput): User

  signinOauth(provider: OauthProviderInput!, oauthTrustCode: String!): TokenInfo

  linkOauth(provider: OauthProviderInput!, oauthTrustCode: String!): TokenInfo

  unlinkOauth(provider: OauthProviderInput!, oauthTrustCode: String!): User

  "follow a user"
  follow(login: String!): User

  "unfollow a user"
  undoFollow(login: String!): User

  "create a collect folder"
  createCollectFolder(title: String!, private: Boolean, desc: String): CollectFolder

  "update a collect folder"
  updateCollectFolder(id: ID!, title: String, private: Boolean, desc: String): CollectFolder

  "delete a collect folder"
  deleteCollectFolder(id: ID!): CollectFolder

  "add article into a collect folder"
  addToCollect(article: ArticleRefInput!, folderId: ID!): CollectFolder

  "remove article from a collect folder"
  removeFromCollect(article: ArticleRefInput!, folderId: ID!): CollectFolder

  "mark a message as read"
  markRead(ids: [ID], type: MailboxType): Done

  "mark all unread message as read"
  markReadAll(type: MailboxType): Done

  makeContribute(userId: ID!): UserContribute

  "create a global community"
  createCommunity(title: String!, desc: String!, slug: String!, logo: String!, locale: String): Community

  "update a community"
  updateCommunity(community: String!, title: String, desc: String, slug: String, logo: String, locale: String): Community

  "delete a global community"
  deleteCommunity(id: ID!): Community

  "apply to create a community"
  applyCommunity(
    title: String!, desc: String!, slug: String!, logo: String!, locale: String, applyMsg: String, applyCategory: String
  ): Community

  "approve the apply to create a community"
  approveCommunityApply(community: String!): Community

  "deny the apply to create a community"
  denyCommunityApply(id: ID!): Community

  "create category"
  createCategory(community: String!, title: String!, slug: String!): Category

  "delete category"
  deleteCategory(community: String!, id: ID!): Category

  "update category"
  updateCategory(community: String!, id: ID!, title: String!): Category

  "add a moderator for a community"
  addModerator(community: String!, user: String!): Community

  "add moderators for a community"
  addModerators(community: String!, users: [String!]!): Community

  "unset a moderator from a community, the user's passport also deleted"
  removeModerator(community: String!, user: String!): Community

  "update cms moderator's title, passport is not effected"
  updateModeratorPassport(community: String!, user: String!, rules: Json!): Community

  "create a tag"
  createCommunityTag(
    title: String!, slug: String!, color: RainbowColor!, layout: String, community: String!, groupId: ID!, thread: Thread, extra: [String], icon: String
  ): CommunityTag

  "update a tag"
  updateCommunityTag(
    id: ID!, community: String!, title: String, layout: String, desc: String, slug: String, color: RainbowColor, groupId: ID, thread: Thread, extra: [String], icon: String
  ): CommunityTag

  "create a tag group"
  createCommunityTagGroup(title: String!, community: String!, thread: Thread): CommunityTagGroup

  "update a tag group"
  updateCommunityTagGroup(id: ID!, community: String!, title: String!, thread: Thread): CommunityTagGroup

  "delete a tag group"
  deleteCommunityTagGroup(id: ID!, community: String!, thread: Thread): CommunityTagGroup

  "delete a tag by thread"
  deleteCommunityTag(id: ID!, community: String!, thread: Thread): CommunityTag

  "set category to a community"
  setCategory(community: String!, categoryId: ID!): Community

  "unset category to a community"
  unsetCategory(community: String!, categoryId: ID!): Community

  "subscribe a community so it can appear in sidebar"
  subscribeCommunity(community: String!): Community

  "unsubscribe a community"
  unsubscribeCommunity(community: String!): Community

  "set a community_tag to content"
  setCommunityTag(article: ArticleRefInput!, communityTagId: ID!): Article

  "unset a tag to content"
  unsetCommunityTag(article: ArticleRefInput!, communityTagId: ID!): Article

  "reindex tags in given group"
  reindexTagsInGroup(community: String!, thread: Thread, groupId: ID!, tags: [ReindexTagInput]): Done

  "reindex tags across groups"
  reindexCommunityTags(community: String!, thread: Thread, tags: [ReindexCommunityTagInput]): Done

  "reindex tag groups"
  reindexCommunityTagGroups(community: String!, thread: Thread, groups: [ReindexCommunityTagGroupInput]): Done

  "mirror article to other community"
  mirrorArticle(article: ArticleRefInput!, targetCommunity: String!, communityTags: [ID]): Article

  "unmirror article for community"
  unmirrorArticle(article: ArticleRefInput!, targetCommunity: String!): Article

  "move article to other community"
  moveArticle(article: ArticleRefInput!, targetCommunity: String!, communityTags: [ID]): Article

  "mirror article to home community"
  mirrorToHome(article: ArticleRefInput!, communityTags: [ID]): Article

  "move article to other community"
  moveToBlackhole(article: ArticleRefInput!, communityTags: [ID]): Article

  "create a post"
  createPost(
    title: String!, body: String!, linkAddr: String, copyRight: String, community: String!, thread: Thread, communityTags: [ID]
  ): Post

  "update a cms\/post"
  updatePost(
    article: ArticleRefInput!, title: String, body: String, digest: String, copyRight: String, linkAddr: String, communityTags: [ID]
  ): Post

  "set cat for a post"
  setPostCat(article: ArticleRefInput!, cat: ArticleCatEnum!): Post

  "set status for a post"
  setPostStatus(article: ArticleRefInput!, status: ArticleStatusEnum!): Post

  "upvote to post"
  upvotePost(article: ArticleRefInput!): Article

  "undo upvote to post"
  undoUpvotePost(article: ArticleRefInput!): Article

  "pin to post"
  pinPost(article: ArticleRefInput!): Post

  "undo pin to post"
  undoPinPost(article: ArticleRefInput!): Post

  "mark delete a post type article, aka soft-delete"
  markDeletePost(article: ArticleRefInput!): Post

  "undo mark delete a post type article"
  undoMarkDeletePost(article: ArticleRefInput!): Post

  "batch mark delete posts type article, aka soft-delete"
  batchMarkDeletePosts(community: String!, ids: [ID], thread: PostThread): DoneState

  "batch undo mark delete posts type article, aka soft-delete"
  batchUndoMarkDeletePosts(community: String!, ids: [ID], thread: PostThread): DoneState

  "permanently delete a post"
  deletePost(article: ArticleRefInput!): Post

  "emotion to post"
  emotionToPost(article: ArticleRefInput!, emotion: ArticleEmotion!): Post

  "undo emotion to post"
  undoEmotionToPost(article: ArticleRefInput!, emotion: ArticleEmotion!): Post

  "report a post"
  reportPost(article: ArticleRefInput!, reason: String!, attr: String): Post

  "undo report a post"
  undoReportPost(article: ArticleRefInput!): Post

  "sink a post"
  sinkPost(article: ArticleRefInput!): Article

  "undo sink to post"
  undoSinkPost(article: ArticleRefInput!): Article

  "lock comment of a post"
  lockPostComment(article: ArticleRefInput!): Article

  "undo lock to a post"
  undoLockPostComment(article: ArticleRefInput!): Article

  "create a blog"
  createBlog(
    title: String!, body: String!, linkAddr: String, copyRight: String, community: String!, thread: Thread, communityTags: [ID]
  ): Blog

  "update a cms\/blog"
  updateBlog(
    article: ArticleRefInput!, title: String, body: String, digest: String, copyRight: String, linkAddr: String, communityTags: [ID]
  ): Blog

